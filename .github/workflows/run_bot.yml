name: 24/7 Telegram Bot Engine

on:
  push:
    branches: [ main, master ]
  schedule:
    # ⏱️ CRITICAL FIX: Ab GitHub har 3 ghante mein automatic naya worker run karega
    - cron: '0 */3 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot Continuous
      run: |
        python main.py
