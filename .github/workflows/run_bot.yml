name: 24/7 Telegram Bot Engine

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */5 * * *' # Har 5 ghante mein automatic restart hoga taaki session live rahe

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot Continuous
      timeout-minutes: 340 # 5.5 ghante baad workflow safely agle schedule ke liye rukk jayega
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # Aapka token yahan se code mein inject hoga
      run: |
        python main.py
